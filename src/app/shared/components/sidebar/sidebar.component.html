<aside class="sidebar"
       [class.collapsed]="collapsed"
       [class.mobile-open]="mobileOpen">

  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg width="32" height="32" viewBox="0 0 38 38" fill="none">
        <rect width="38" height="38" rx="11" fill="#f59e0b"/>
        <path d="M7 26 L12 17 L18 21 L24 11 L31 26"
              stroke="#fff" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"
              fill="none"/>
        <circle cx="12" cy="17" r="2.2" fill="#fff"/>
        <circle cx="24" cy="11" r="2.2" fill="#fff"/>
      </svg>
    </div>
    <span class="logo-text" *ngIf="!collapsed">LoriView</span>
    <button class="collapse-btn"
            (click)="toggleCollapse.emit()"
            [matTooltip]="collapsed ? 'Expand' : 'Collapse'"
            matTooltipPosition="right">
      <mat-icon>
        {{ collapsed ? 'chevron_right' : 'chevron_left' }}
      </mat-icon>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">

      <div class="nav-section"
           *ngIf="item.section && !collapsed">
        {{ item.section }}
      </div>
      <div class="nav-divider"
           *ngIf="item.section && collapsed">
      </div>

      <button class="nav-item"
              [class.active]="isActive(item.route)"
              (click)="navigate(item.route)"
              [matTooltip]="collapsed ? item.label : ''"
              matTooltipPosition="right">

        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>

        <span class="nav-label" *ngIf="!collapsed">
          {{ item.label }}
        </span>

        <span class="nav-badge"
              *ngIf="item.badge && item.badge > 0 && !collapsed">
          {{ item.badge }}
        </span>

        <span class="nav-badge-dot"
              *ngIf="item.badge && item.badge > 0 && collapsed">
        </span>

      </button>

    </ng-container>
  </nav>

  <!-- User — expanded -->
  <div class="sidebar-user" *ngIf="!collapsed">
    <div class="user-avatar">{{ userInitials }}</div>
    <div class="user-info">
      <div class="user-name">{{ userName }}</div>
      <div class="user-email">{{ userEmail }}</div>
    </div>
    <button class="logout-btn" (click)="logout()"
            matTooltip="Sign out" matTooltipPosition="right">
      <mat-icon>logout</mat-icon>
    </button>
  </div>

  <!-- User — collapsed -->
  <div class="sidebar-user-mini" *ngIf="collapsed">
    <div class="user-avatar-mini">{{ userInitials }}</div>
    <button class="logout-btn-mini" (click)="logout()"
            matTooltip="Sign out" matTooltipPosition="right">
      <mat-icon>logout</mat-icon>
    </button>
  </div>

</aside>
